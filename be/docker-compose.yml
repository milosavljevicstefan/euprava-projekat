version: '3.8'

services:
  preschool-app:
    build: ./preschool-service
    ports:
      - "8081:8081"
    container_name: preschool-service
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: euprava
      MONGO_COLLECTION: vrtici
      JWT_SECRET: dev-secret
      AUTH_SALT: dev-salt
    depends_on:
      - mongo

  auth-app:
    build: ./auth-service
    ports:
      - "8083:8083"
    container_name: auth-service
    environment:
      MONGO_URI: mongodb://mongo:27017
      MONGO_DB: euprava
      JWT_SECRET: dev-secret
      AUTH_SALT: dev-salt
    depends_on:
      - mongo

  open-data-app:
    build: ./open-data-service
    ports:
      - "8084:8084"
    container_name: open-data-service
    environment:
      PORT: 8084
      VRTICI_API_URL: http://preschool-app:8081
    depends_on:
      - preschool-app

  mongo:
    image: mongo:7
    container_name: preschool-mongo
    ports:
      - "27018:27017"
    volumes:
      - mongo-data:/data/db

volumes:
  mongo-data: